version: "3.8"
services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
      # - "8920:8920"  # HTTPS opcional
    volumes:
      - /appdata/jellyfin/config:/config
      - /appdata/jellyfin/cache:/cache
      - /mnt/desktop_media:/media:rw
    environment:
      - TZ=Europe/Lisbon
    networks:
      - apps_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  apps_net:
    name: apps_net
    driver: bridge